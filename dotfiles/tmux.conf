set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux configuration reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1f2335,fg=#a9b1d6"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#7aa2f7,bold] 󰆍 #S #[default]"
set -g status-right "#[fg=#9ece6a]#(hostname -s) #[fg=#565f89]| #[fg=#bb9af7]%Y-%m-%d #[fg=#7dcfff]%H:%M "

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#1f2335,bg=#7aa2f7,bold] #I:#W "

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1f2335,bold"
